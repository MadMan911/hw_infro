version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mock-llm-1
      - mock-llm-2
      - mock-llm-3
      - otel-collector
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000

  mock-llm-1:
    build:
      context: ./mock_llm_server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - MOCK_LATENCY_MS=100
      - MOCK_ERROR_RATE=0.0

  mock-llm-2:
    build:
      context: ./mock_llm_server
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    environment:
      - PORT=8001
      - MOCK_LATENCY_MS=200
      - MOCK_ERROR_RATE=0.05

  mock-llm-3:
    build:
      context: ./mock_llm_server
      dockerfile: Dockerfile
    ports:
      - "8003:8001"
    environment:
      - PORT=8001
      - MOCK_LATENCY_MS=300
      - MOCK_ERROR_RATE=0.1

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --gunicorn-opts "--forwarded-allow-ips=*"
